<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>肖同学的小窝</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="avatar-wrapper">
                <img src="https://neeko-copilot.bytedance.net/api/text2image?prompt=cute%20asian%20girl%20avatar%20cartoon%20style%20pink%20background&image_size=square" alt="肖同学" class="avatar" id="avatar-img">
                <label for="avatar-upload" class="avatar-upload-btn">📷</label>
                <input type="file" id="avatar-upload" accept="image/*">
                <div class="sparkles">✨</div>
            </div>
            <h1 class="name">肖同学</h1>
            <p class="age">20岁 | 广东科学技术职业学院</p>
            <div class="tags">
                <span class="tag">🍔 美食爱好者</span>
                <span class="tag">📷 摄影达人</span>
                <span class="tag">🚶 citywalk</span>
                <span class="tag">🎵 音乐发烧友</span>
            </div>
        </header>

        <section class="about">
            <h2 class="section-title">关于我 💫</h2>
            <div class="about-content">
                <p>大家好呀~ 我是肖同学，一个热爱生活的大学生！</p>
                <p>喜欢穿梭在城市的大街小巷，用相机记录生活中的小美好，</p>
                <p>也喜欢探寻各种美食，用味蕾感受世界的奇妙！</p>
                <p>希望在这里和大家分享我的故事~ 💕</p>
            </div>
        </section>

        <section class="gallery">
            <h2 class="section-title">我的相册 📸</h2>
            <div class="upload-area">
                <label for="file-upload" class="upload-btn">
                    <span class="upload-icon">📤</span>
                    <span>上传照片/视频</span>
                </label>
                <input type="file" id="file-upload" accept="image/*,video/*" multiple>
            </div>
            <div class="upload-form" id="upload-form">
                <h3 class="upload-form-title">添加照片信息 ✏️</h3>
                <img id="upload-preview" class="upload-preview" src="" alt="预览">
                <input type="text" id="photo-title" placeholder="照片标题" class="message-input">
                <textarea id="photo-desc" placeholder="描述一下这张照片吧~" class="message-textarea"></textarea>
                <input type="datetime-local" id="photo-time" class="message-input">
                <div class="upload-buttons">
                    <button id="cancel-btn" class="cancel-btn">取消</button>
                    <button id="confirm-btn" class="send-btn">确认添加 ✨</button>
                </div>
            </div>
            <div class="gallery-grid" id="gallery-grid">
                <p class="gallery-empty">还没有照片哦，快上传一些吧~ 📸</p>
            </div>
        </section>

        <section class="messages">
            <h2 class="section-title">留言板 💬</h2>
            <div class="message-form">
                <input type="text" id="message-name" placeholder="你的名字~" class="message-input">
                <textarea id="message-content" placeholder="留下你的留言吧~" class="message-textarea"></textarea>
                <button id="send-btn" class="send-btn">发送 💌</button>
            </div>
            <div class="message-list" id="message-list"></div>
        </section>

        <footer class="footer">
            <p>✨ 感谢访问我的小窝 ✨</p>
            <p>© 2024 肖同学</p>
        </footer>
    </div>

    <!-- 放大查看模态框 -->
    <div class="modal" id="photo-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <div id="modal-media"></div>
            <div class="modal-info">
                <h3 id="modal-title"></h3>
                <p id="modal-desc"></p>
                <p class="modal-time" id="modal-time"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
